openapi: 3.0.3
info:
  title: ops-agent API
  version: 0.3.9
servers:
  - url: http://127.0.0.1:8090
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
security:
  - bearerAuth: []
paths:
  /ready:
    get:
      security: []
      summary: Readiness probe
      responses:
        '200':
          description: OK
  /metrics:
    get:
      security: []
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics text
  /health/run:
    get:
      summary: Run health checks for an environment, including highlights, recent changes, and strategy-tagged suggestions
      parameters:
        - in: query
          name: env
          schema: { type: string, default: test }
        - in: query
          name: notify
          schema:
            type: boolean
            description: When true and a notifier is configured, send the incident summary for warn/fail results
      responses:
        '200': { description: Health results }
  /prometheus/query:
    get:
      summary: Run a read-only PromQL query against the environment's Prometheus
      parameters:
        - in: query
          name: env
          required: true
          schema: { type: string }
        - in: query
          name: query
          required: true
          schema: { type: string }
        - in: query
          name: minutes
          schema: { type: integer, default: 0, description: 0 means instant query }
        - in: query
          name: step
          schema: { type: string, description: Optional range step duration such as 60s or 5m }
      responses:
        '200': { description: Prometheus query result }
  /changes/events:
    post:
      summary: Ingest one external change or deploy event into audit/timeline correlation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [env, message]
              properties:
                kind:
                  type: string
                  description: Optional change kind such as deploy, release, rollback, maintenance, config, or change
                action:
                  type: string
                  description: Optional explicit action name; defaults to <kind>_event
                actor:
                  type: string
                project:
                  type: string
                env:
                  type: string
                target:
                  type: string
                target_host:
                  type: string
                status:
                  type: string
                message:
                  type: string
                reference:
                  type: string
                revision:
                  type: string
                url:
                  type: string
      responses:
        '200': { description: Change event stored }
  /changes/github:
    post:
      summary: Ingest a GitHub deployment or workflow webhook as a change event
      parameters:
        - in: query
          name: env
          schema: { type: string, description: Optional env override when the webhook payload does not carry one }
        - in: query
          name: project
          schema: { type: string }
      responses:
        '200': { description: GitHub webhook stored as change event }
  /changes/gitlab:
    post:
      summary: Ingest a GitLab pipeline or release webhook as a change event
      parameters:
        - in: query
          name: env
          schema: { type: string, description: Optional env override when the webhook payload does not carry one }
        - in: query
          name: project
          schema: { type: string }
      responses:
        '200': { description: GitLab webhook stored as change event }
  /changes/recent:
    get:
      summary: List recent change/deploy events from audit, including reference, revision, and link metadata when available
      parameters:
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: env
          schema: { type: string }
        - in: query
          name: minutes
          schema: { type: integer, default: 120 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200': { description: Recent change events }
  /alerts/alertmanager:
    post:
      summary: Ingest Alertmanager webhook alerts into the incident lifecycle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [alerts]
              properties:
                receiver:
                  type: string
                status:
                  type: string
                commonLabels:
                  type: object
                  additionalProperties: { type: string }
                commonAnnotations:
                  type: object
                  additionalProperties: { type: string }
                alerts:
                  type: array
                  items:
                    type: object
                    properties:
                      status:
                        type: string
                      fingerprint:
                        type: string
                      startsAt:
                        type: string
                        format: date-time
                      endsAt:
                        type: string
                        format: date-time
                      generatorURL:
                        type: string
                      labels:
                        type: object
                        additionalProperties: { type: string }
                      annotations:
                        type: object
                        additionalProperties: { type: string }
      responses:
        '200': { description: Alertmanager alerts ingested }
  /actions/request:
    post:
      summary: Create action request (pending or auto-executed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [check_host_health, check_service_health, check_dependencies, restart_container, rollback_release]
                env:
                  type: string
                  default: test
                target_host:
                  type: string
                args:
                  type: array
                  items: { type: string }
                actor:
                  type: string
                timeout_seconds:
                  type: integer
      responses:
        '202': { description: Accepted }
  /actions/pending:
    get:
      summary: List pending approval requests
      responses:
        '200': { description: Pending list }
  /actions/get:
    get:
      summary: Get one action request by request_id
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Action detail }
  /actions/approve:
    post:
      summary: Approve and execute a pending request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                approver:
                  type: string
                timeout_seconds:
                  type: integer
      responses:
        '200': { description: Executed }
  /actions/reject:
    post:
      summary: Reject a pending request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                approver:
                  type: string
                reason:
                  type: string
      responses:
        '200': { description: Rejected }
  /actions/list:
    get:
      summary: List actions by status
      parameters:
        - in: query
          name: status
          schema: { type: string, default: pending }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200': { description: Action list (with next_cursor) }
  /actions/run:
    post:
      summary: Direct action execution (policy guarded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [check_host_health, check_service_health, check_dependencies, restart_container, rollback_release]
                env:
                  type: string
                  default: test
                target_host:
                  type: string
                args:
                  type: array
                  items: { type: string }
                actor:
                  type: string
                approved:
                  type: boolean
                timeout_seconds:
                  type: integer
      responses:
        '200': { description: Executed }
  /audit/tail:
    get:
      summary: Tail audit log lines
      parameters:
        - in: query
          name: file
          schema:
            type: string
            description: Basename of a `.jsonl` file inside the configured audit directory
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200': { description: Tail lines }
  /incidents/summary:
    get:
      summary: Incident summary in a time window
      parameters:
        - in: query
          name: minutes
          schema: { type: integer, default: 60 }
      responses:
        '200': { description: Summary }
  /incidents/active:
    get:
      summary: List active incidents
      parameters:
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: env
          schema: { type: string }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200': { description: Active incident list }
  /incidents/stats:
    get:
      summary: Get aggregated incident lifecycle stats
      parameters:
        - in: query
          name: project
          schema: { type: string }
        - in: query
          name: env
          schema: { type: string }
        - in: query
          name: source
          schema: { type: string }
      responses:
        '200': { description: Incident lifecycle stats }
  /incidents/get:
    get:
      summary: Get one incident by incident_id
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Incident detail }
  /incidents/timeline:
    get:
      summary: Get the incident timeline and likely correlated changes
      parameters:
        - in: query
          name: id
          required: true
          schema: { type: string }
        - in: query
          name: minutes
          schema: { type: integer, default: 90 }
      responses:
        '200': { description: Incident timeline }
  /incidents/ack:
    post:
      summary: Acknowledge one incident
      description: When the incident originated from Alertmanager and the API is started with alertmanager ack-sync enabled, this call also creates and persists a matching Alertmanager silence.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                actor:
                  type: string
                note:
                  type: string
      responses:
        '200': { description: Incident acknowledged }
  /incidents/reconcile-alertmanager:
    post:
      summary: Refresh stored Alertmanager silence state back into incident records
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  description: Optional incident id to reconcile
                project:
                  type: string
                env:
                  type: string
                actor:
                  type: string
      responses:
        '200': { description: Alertmanager silence reconciliation result }
  /incidents/unsilence:
    post:
      summary: Expire one Alertmanager silence attached to an incident
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                actor:
                  type: string
                note:
                  type: string
      responses:
        '200': { description: Incident silence expired }
  /incidents/assign:
    post:
      summary: Assign one incident owner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, owner]
              properties:
                id:
                  type: string
                owner:
                  type: string
                actor:
                  type: string
                note:
                  type: string
      responses:
        '200': { description: Incident assigned }
