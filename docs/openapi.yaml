openapi: 3.0.3
info:
  title: ops-agent API
  version: 0.3.0
servers:
  - url: http://127.0.0.1:8090
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: token
security:
  - bearerAuth: []
paths:
  /ready:
    get:
      security: []
      summary: Readiness probe
      responses:
        '200':
          description: OK
  /metrics:
    get:
      security: []
      summary: Prometheus metrics
      responses:
        '200':
          description: Metrics text
  /health/run:
    get:
      summary: Run health checks for an environment
      parameters:
        - in: query
          name: env
          schema: { type: string, default: test }
      responses:
        '200': { description: Health results }
  /actions/request:
    post:
      summary: Create action request (pending or auto-executed)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [check_host_health, check_service_health, check_dependencies, restart_container, rollback_release]
                env:
                  type: string
                  default: test
                target_host:
                  type: string
                args:
                  type: array
                  items: { type: string }
                actor:
                  type: string
                timeout_seconds:
                  type: integer
      responses:
        '202': { description: Accepted }
  /actions/pending:
    get:
      summary: List pending approval requests
      responses:
        '200': { description: Pending list }
  /actions/approve:
    post:
      summary: Approve and execute a pending request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                approver:
                  type: string
                timeout_seconds:
                  type: integer
      responses:
        '200': { description: Executed }
  /actions/reject:
    post:
      summary: Reject a pending request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [request_id]
              properties:
                request_id:
                  type: string
                approver:
                  type: string
                reason:
                  type: string
      responses:
        '200': { description: Rejected }
  /actions/list:
    get:
      summary: List actions by status
      parameters:
        - in: query
          name: status
          schema: { type: string, default: pending }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        '200': { description: Action list (with next_cursor) }
  /actions/run:
    post:
      summary: Direct action execution (policy guarded)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [check_host_health, check_service_health, check_dependencies, restart_container, rollback_release]
                env:
                  type: string
                  default: test
                target_host:
                  type: string
                args:
                  type: array
                  items: { type: string }
                actor:
                  type: string
                approved:
                  type: boolean
                timeout_seconds:
                  type: integer
      responses:
        '200': { description: Executed }
  /audit/tail:
    get:
      summary: Tail audit log lines
      parameters:
        - in: query
          name: file
          schema:
            type: string
            description: Basename of a `.jsonl` file inside the configured audit directory
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
      responses:
        '200': { description: Tail lines }
  /incidents/summary:
    get:
      summary: Incident summary in a time window
      parameters:
        - in: query
          name: minutes
          schema: { type: integer, default: 60 }
      responses:
        '200': { description: Summary }
