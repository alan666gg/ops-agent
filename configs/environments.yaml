environments:
  test:
    hosts:
      - name: test-app-1
        host: 127.0.0.1
        ssh_user: root
        ssh_port: 22
        checks:
          load_warn_per_cpu: 1.5
          load_fail_per_cpu: 2.5
          memory_warn_percent: 85
          memory_fail_percent: 95
          disk_warn_percent: 80
          disk_fail_percent: 90
          inode_warn_percent: 80
          inode_fail_percent: 90
          filesystem_path: /
    services:
      - name: app
        host: test-app-1
        type: container
        container_name: cicdtest-app
        healthcheck_url: http://127.0.0.1:8080/
        slo:
          availability_target: 99.9
          page_short_window: 5m
          page_long_window: 1h
          page_burn_rate: 10
          ticket_short_window: 30m
          ticket_long_window: 6h
          ticket_burn_rate: 2
          min_samples: 4
    dependencies:
      - tcp://127.0.0.1:6379
      - tcp://127.0.0.1:3306

  prod:
    hosts: []
    services: []
    dependencies: []
